<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>samaan khareedo</title>

    <link rel="stylesheet" href="project.css">
</head>

<body>

    <header>

        <h1>samaan khareedo</h1>

        <div class="cart">
            🛒 Cart: <span id="cart-count">0</span>

            <br><br>

            Total Price: ₹<span id="total-price">0</span>
        </div>

    </header>

    <center>
        <p id="message"></p>

        <button onclick="clearCart()">
            Clear Cart
        </button>
    </center>

    <section class="products">

        <div class="product">

            <img src="projshoes.webp" alt="Shoes">

            <h2>Shoes</h2>

            <p>₹1999</p>

            <button onclick="addToCart('Shoes',1999)">
                Add to Cart
            </button>

        </div>

        <div class="product">

            <img src="projwatch.webp" alt="Watch">

            <h2>Watch</h2>

            <p>₹2999</p>

            <button onclick="addToCart('Watch',2999)">
                Add to Cart
            </button>

        </div>

        <div class="product">

            <img src="projheadphones.jpg" alt="Headphones">

            <h2>Headphones</h2>

            <p>₹1499</p>

            <button onclick="addToCart('Headphones',1499)">
                Add to Cart
            </button>

        </div>

    </section>

    <script src="project.js"></script>

</body>
</html>
